template: abl
products:
  - brand: ABL
    description:
      generic: eMH1
  - brand: ABL
    description:
      generic: eMH2
  - brand: SENEC
    description:
      generic: Wallbox pro
capabilities: ["mA"]
requirements:
params:
  - name: modbus
    choice: ["rs485"]
    baudrate: 38400
    comset: 8E1
  - name: timeout
render: |
  type: abl
  {{- include "modbus" . }}
  timeout: {{ .timeout }}
